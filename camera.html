<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>AR — выбор раздела</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root{
      --bg:#0b1020;
      --text:#e7ecff;
      --muted:#a9b3d6;
      --stroke:rgba(255,255,255,.10);
      --accent:#7c5cff;
      --accent2:#32d1ff;
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      min-height:100vh;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 500px at 10% 10%, rgba(124,92,255,.35), transparent 60%),
        radial-gradient(800px 500px at 90% 20%, rgba(50,209,255,.24), transparent 55%),
        var(--bg);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .panel{
      width:min(760px, 100%);
      padding:24px;
      border-radius:24px;
      border:1px solid var(--stroke);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      box-shadow:0 20px 50px rgba(0,0,0,.35);
    }
    .eyebrow{
      display:inline-flex;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color:var(--muted);
      font-size:12px;
      font-weight:800;
      margin-bottom:10px;
    }
    h1{
      margin:0 0 10px;
      font-size:34px;
      line-height:1.1;
    }
    p{
      margin:0 0 18px;
      color:var(--muted);
      line-height:1.6;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:14px;
      margin-top:16px;
    }
    .card{
      display:block;
      padding:18px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(17,26,51,.45);
      color:var(--text);
      text-decoration:none;
    }
    .card:hover{
      transform:translateY(-1px);
      filter:brightness(1.05);
    }
    .card__title{
      margin:0 0 8px;
      font-size:20px;
      font-weight:800;
    }
    .card__text{
      margin:0;
      font-size:15px;
      color:var(--muted);
    }
    .back{
      display:inline-flex;
      margin-top:18px;
      color:var(--text);
      text-decoration:none;
      padding:10px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.05);
    }
    @media (max-width:700px){
      h1{font-size:28px;}
      .grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="eyebrow">Призраки прошлого</div>
    <h1>Выбери раздел</h1>
    <p id="infoText">Открой дома или памятники.</p>

    <div class="grid" id="chooser">
      <a class="card" href="camera-homes.html">
        <div class="card__title">Дома</div>
        <div class="card__text">Дом Булыгина, дом Наумова, дом Пчелина.</div>
      </a>

      <a class="card" href="camera-monuments.html">
        <div class="card__title">Памятники</div>
        <div class="card__text">Пушкин и Евгений Онегин, Елизавета Петровна.</div>
      </a>
    </div>

    <a class="back" href="index.html">← Назад на главную</a>
  </div>

  <script src="places.js"></script>
  <script>
    (function () {
      const url = new URL(window.location.href);
      const placeSlug = url.searchParams.get("place") || "";
      const groupSlug = url.searchParams.get("group") || "";
      const infoText = document.getElementById("infoText");

      if (placeSlug) {
        const place = window.getPlaceBySlug(placeSlug);

        if (place && place.enabled) {
          if (place.group === "homes") {
            window.location.replace(`camera-homes.html?place=${encodeURIComponent(place.slug)}`);
            return;
          }

          if (place.group === "monuments") {
            window.location.replace(`camera-monuments.html?place=${encodeURIComponent(place.slug)}`);
            return;
          }
        }

        infoText.textContent = "Объект не найден. Выбери раздел вручную.";
        return;
      }

      if (groupSlug === "homes") {
        window.location.replace("camera-homes.html");
        return;
      }

      if (groupSlug === "monuments") {
        window.location.replace("camera-monuments.html");
        return;
      }
    })();
  </script>
</body>
</html>
